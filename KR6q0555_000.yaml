front:
  text: 高峰喬松和尚語録序孟子曰聖人百世之師也大慧之道豈置百世之師哉後之星宿劫有聖者賢者出其匕以大慧毗婆尸佛況賢劫之尊尚者乎大慧既具如是道矣則為大慧之裔而紹其門庭者亦將具如是道矣聚雲中興其道者也慶忠又能擴充其道者也嗣慶忠者眉山三山童真諸老約十餘人而高峰喬和尚亦其一焉自是以往愈昌愈熾愈衆愈違其道寧可量歟尚生而岐嶷長而聰哲得頭於一貫冊內徹尾於掛牌室中十載辛苦一朝記莂既而開爐白巖唱教永興三坐道場語録二卷皆膾炙叢林服膺緇素未幾放舟東下駐錫漢陰而法幢夕殞金鐸晨裂旋告寂於臥雲焉易簧之日惟諄諄以未得李子序録為恨且囑童和尚為之代索嗟乎李子豈真能知尚者哉抑聞之道之所不異雖在所而咸契上而劫空下而界盡遠而河山近而目睫莫不心心相印眼眼相證道在斯言在言在斯心在不必分覿面與未覿面也尚之心寓於録而李子即因録以見尚之心如是則即未及接謦咳聆話言然已與尚膠漆投而水乳合矣況乎晴川大別面目現在則知尚者宜莫如李子序尚者又寧有外於李子哉李子其與尚相遇於歷歷萋萋芳草洲樹之間乎使由是而廣其録於海內焉吾知見心者皆如李子見師之心如大慧之心者亦皆如李子則尚之道亦將為百世師矣李子敢不歡喜合掌而為之序康熙九年仲夏吉州學人屏山李道濟龍孫和南述目次序上堂小參示衆機緣真讚偈語頌古行由宗統
