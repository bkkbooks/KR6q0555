body:
  text: 書記燈洪録上堂住重慶府忠州柏巖禪院語順治乙未臘八日忠州紳士四衆等請結制啓藏說戒於柏巖禪寺師至座前拈請疏曰三藏十二部一切修多羅撿不出百千法門無量妙義未曾有總被衆檀越逗漏了也直須著眼升座拈香祝聖畢次拈曰這瓣香出有入無時顯時隱不敢輕輕動著今日拈來供養見住夔州府梁山縣慶忠堂上傳臨濟正宗二十六代上鐵下壁大和尚以酬法乳斂衣據坐維那白槌師曰第一義休錯會聽吾念個波羅蜜烏雞聲亂啼老鼠鬧啾唧悉達睹明星拄杖驀頭劈打佛罵祖過時光按豆遮睛且度曰截斷諸方五味禪掀翻窠窟一不立一一啓我演毗尼盞子落地楪子七下座上堂卓拄杖曰德山來也喝一喝曰臨濟到此召大衆曰有具眼底麼出來道看僧問靈峰付囑付個什麼師曰向上些問來曰如何是舉揚底一句師便打曰新登曲彔大施鉗錘是為人耶師曰汝猶嫌少在僧禮拜師復卓一卓喝一喝衆請開示升座師噓一聲良久曰參方衲子大須子細山僧自依我慶忠老人十數年來今日方始瞥地汝等諸人還識麼僧問如何是了了常知師曰燕語鶯啼上堂僧問金牛飯僧為甚大光作舞師曰翠岫嶒崚如佛立進曰皇天無二道聖賢無兩心為甚溈山飯鴉南泉斬貓師曰白雲繚繞似龍飛僧佇立師乃曰石火莫及電光罔追截流之機徒勞佇思向未屙以前薦得猶較些子必待絲來線去濟個什麼邊事喝一喝上堂僧問如何是佛師曰泥塑木雕如何是法師曰白紙黑字如何是僧師曰方袍圓頂曰三問已蒙指示向上宗乘若何師便打又僧出師擲下拄杖曰汝等直須別行一路母難上堂㘞地一聲來即當三十六逢人唱哩囉未是報恩處大衆還識報恩麼泥牛連夜吼鐵馬舞三台上堂以拄杖橫肩曰會麼具眼者出來山僧有個驗處一僧出師便打僧禮拜師卓一卓曰山花似錦間水如藍乾坤浩蕩日月高懸分賓主沒正偏謝三郎在釣魚船擲拄杖下座上堂連喝四喝曰喚作金剛寶劍得麼喚作踞地獅子得麼喚作探竿影草得麼喚作一喝不作一喝用得麼咄臨濟老漢口門太窄若到山僧門下好與一頓一僧出師曰今日不與交鋒元旦上堂海闊山高高又深衲僧野外祝升平皇風鼓動乾元律白雪陽春遍界吟喝一喝上堂僧問如何是高高山頂立師曰直下看如何是深深海底行師曰高著眼僧背卻法堂作揖師曰弄怪作麼曰易分雪裏粉難辨墨中煤師驀頭一棒乃曰頂門著楔腳板栽釘高低拔出伶俐衲僧恁麼恁麼也是將錯就錯其或未然且莫造次解制上堂世尊掩室於摩竭淨名杜口於毗耶似未覺寬行大步爭似山僧今日解開布袋縱教臨濟德山向汝等腳跟底下乞命未為分外何故聻卓一卓住夔州府梁山縣高峰禪院語順治辛丑十月朔一日期主王含輝居士請上堂師拈疏曰這居士既已捨宅為寺又請護衆開爐道是甚麼行維那宣疏畢師升座拈香祝聖罷次拈曰這瓣香熱似寒冰冷如烈焰熾破諸佛面門透開祖師鼻孔爇向罏中供養浯江寶聖堂上慶忠老和尚用酬法乳斂衣據坐維那白槌師卓拄杖云南山雲北山雨金牛飯廬陵米時時鐵樹開花處處玉梅結李鼠溺窗櫺上頭滴個葫蘆圈子會不會委不委客杯弓影竟非蛇冢邊髑髏元是水首座出師擲拄杖下座因雪上堂僧問未開口時如何師曰開口了也曰末後聻師曰方丈來為汝道復曰玉片彌空落銀沙匝地飛江山同一色色外有誰知不見仰山指雪師子云還有過得此色者麼雲門云當時便與推倒雪竇云只解推倒不解扶起師召大衆曰推倒扶起蜀山淮水兩刃交鋒晴空清霽喝一喝冬至上堂卓拄杖云今辰長至日也群陰剝盡一陽來復衲僧到此心眼俱開豎拄杖云幸有這個未曾抽枝只是不得將他動著不動著事作麼生靠拄杖下座祈雨上堂高峰結制日輪紅不降滂沱鼓黑鳳擊禪床云一棒劈開虛空髓普天匝地盡流通師延期上堂僧問風行草偃水到渠成為甚世尊宋離兜率已降王宮師云新鮮底道句來曰這句也石陳師便打乃曰今日仲冬初六年光不覺虛度分明母難臨期諸人濟濟慶祝且道慶祝個甚麼喝一喝上堂問如何是佛向上人師曰燈籠騎佛殿如何是法身師曰廚庫舞三門問有佛處不得住因甚無佛處急走過師曰闍黎從甚處去來曰這裏師曰錯過了也乃曰拄杖口闊沒甚喫法一口吞盡八萬四千諸佛恆河沙數衆生管甚向上法身住與不住何以故直為拂子無端與修羅鬥額幸有無柄鐵鎚擊碎空王釘橛嚘上堂東山有西山有澗北梅澗南柳一隊鴛鴦逐水流兩輪日月穿梭走末後句有無有疑殺天下老禪和笑破街前布袋口上堂今日季冬十五高峰院內打鼓說甚祖意西來但見梅開笑雨且道笑個甚麼殷勤為解丁香結放出枝頭自在春元旦上堂豎拄杖云拄杖子說法去也說甚麼法壬寅元旦大好慶贊作麼慶贊兩個五百原來一貫擲拄杖下座上堂舉世尊才生下一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊雲門偃云我當時若見一棒打殺與狗子吃貴圖天下太平琅琊覺云雲門可謂將此深心奉塵剎是則名為報佛恩今日高峰未免判斷一上世尊只知背脊朝天不覺腦門著地雲門膽大心粗總緣理直氣壯琅琊為人雪屈不合錯下名言各與二十拄杖穿卻鼻孔拽向十字街前一坑埋窖免得殃及後人還見高峰用處麼千峰勢到嶽邊止萬派聲歸海上消解制上堂三月安期九旬定制長連床上哥哥弟弟制滿期圓東去西去南去北去近去遠去三千里外遇著個人向道高峰今日解制擲拄杖下座退院上堂自住高峰幾度秋剜心剖腹為誰讎今朝把釣江湖去不風流處也風流住湖廣鄂州大別山臥雲禪院語康熙戊申八月望日四衆等請升座師曰山僧自住臥雲一向口掛壁上不曾將一言半句點染諸方無端被汝等拽出將謂有佛法與人耶良久豎拄杖曰著著著卓一下曰咦咦咦大衆會麼古人道你有拄杖子我與你拄杖子既有拄杖子又與作甚麼又道你無拄杖子我與你奪了拄杖子既無拄杖子又奪個甚麼若見得諦當道得分明一任同餐無米飯共飲趙州茶其或未然莫作兒戲衆下語未愜師頌曰與奪曾將正令行晴霞暗捲嶺頭雲一輪杲日當空照消卻從前火裏冰請為桂雲吾居士對靈升座曰諸行無常示生滅法生滅滅已寂滅為樂生滅去來如夢幻泡影所以道夢中還作夢夢裏幻愈多驀豎拂子云雲吾居士向拂子頭上來也乃說偈云活計生涯湖海遊披星戴月幾經秋一朝興盡歸何處浪靜風停水自流還聞麼日前居士病時山僧囑曰但把萬緣放下不須更念去來居士瞻顧點首復豎拂子云若向拂子頭上識取根源則知今日恁麼去畢竟恁麼來昔日恁麼來畢竟恁麼去生滅去來猶同夢幻還會麼乃擲下拂子衆為師五旬慶祝值雪請升座師曰五旬無法說天雨六花飛山河同一色全露法王機大衆見麼若見眼中著楔若不見辜負今時試出來道看良久無出衆者乃曰其蓉石唱無生曲黃鶴樓吟白雪詩下座戊申仲冬龔文學傳慶忠老人訃音兼捧舍利至師升座曰臥雲深處忽然聞訃不用哀號不用慟哭惟存鐵石心腸顯揚吾師面目拈舍利召大衆云見麼雙睛青白骨如金萬種光從這裏出咄為老人薦九升座舉老人辭世偈云儘力難說出驢年想不來信口道個偈非是強安排豐干子觀自在歸去來吽吽只當打個瞌睡呵呵此是先師遺言不肖億且為衆等露個消息儘力難說出著云說出了也驢年想不來這句聻信口道個偈何必非是強安排不必豐干子莫忘悲願力觀自在能救世間苦歸去來遊戲三昧吽吽靈符一道只當打個瞌睡寐語作麼呵呵一場笑具山僧恁麼告報畢竟如何理會衆競出師下座佛成道李公祥居士請升座僧問臥雲家風即不問腳跟點地事如何師曰汝腳跟點地也未僧喝師便打問人人頂門具眼個個肘後懸符因甚釋迦必待睹星方悟師曰年年此日歲歲今朝進云一語喚回鸚鵡夢九霄奪得鳳凰歸師卓拄杖進云恁麼則麈尾風光揮宇宙杖頭春色滿晴巒師和聲便打乃曰釋迦老子忒不唧溜未免遭人檢點良久曰且莫草草匆匆喝一喝為慶忠老人盡九設供升座九九含悲淚眼開愁雲散盡震聲雷吾師此日歸何處大地山河正舉哀震威一喝除夕茶話師曰衲僧行徑佛祖難窺茶來吃茶飯來吃飯逢緣遇境顯露宗風止如今夕爆竹連天震臨濟之喝鼓聲動地響禾山之音無束無拘鬧鬧浩浩且三十日到來還有不錯過者麼衆下語有云何曾動著有云眉毛眼上橫有云月落不離天有云鼻頭兩孔氣有云撇下生柴不夾煙有云迎新棄舊影婆娑有云不露一絲毫有云一輪明月照長空有云看腳下如是長言短語爭奈傍觀者笑何故聻戊申除夕今宵去己酉新春明日來元旦升座云祥風浩蕩乾坤永瑞氣氤氳宇宙長林下野人無個事心香一瓣祝吾皇衆作雪獅子成請讚師曰碎玉堆成通身銀色哮吼一聲百獸腦裂喝一喝為慶忠老人百期升座云吾師生平好撾塗毒鼓慣用返魂香直令佛祖魂驚麼魔膽顫即今圓寂百期不肖兒郎又作麼生施設良久卓拄杖三下連喝三喝云且道為著何來為恆默寮元起龕以拄杖指龕云這一龕從來入得出不得出得入不得欲識出入無礙底一句麼擊龕三下云靈符到此百無禁忌舉火云恁麼來恁麼去恁麼恁何處回避舉起火炬云會麼有漏歸無漏一去即一來攛下火炬師訪曹公茶次公問老師是禪是玄師曰總不恁麼曰是那一宗師舉杯云請茶公低首師曰是玄是禪公良久云某看內典讀至優曇華三千年一開頗有入處只是難見師曰此花時一現耳公曰可見麼師作拈華勢公曰彼此若知則不是也師曰不知又爭得公翌日至庵師與談論不輟公欣然稽首曰始知老師不比尋常師呵呵大笑公殷勤謝教而去師以十問勘驗諸方一僧於末後一轉無語可答師云這僧死在臥雲語下衆中有代渠轉身吐氣底麼堂中首領各下一語僧不肯仍入方丈求師代答師曰任從滄海變終不為君通僧問雪覆千山因甚孤峰不白師云道甚麼又僧問雪獅子騎得騎不得師曰切忌辜負好衆慶觀音會請升座云枝頭甘露水涓滴潤焦枯普門新示現高掛月輪孤召大衆云見麼畫一圓相於中著一點作女人拜下座示即佛道人即心即佛水洗水非心非佛泥洗泥心佛俱忘不是物就中消息幾人知寄淨修禪人曾向高峰一別歸把茆蓋頭佛不為翼翎養就騰霄漢莫學烏鴉戀舊飛示法已禪人自古晴川地高閣靄重樓到來無剩法楚水向東流登黃鶴樓不見漢陽樹惟存鸚鵡洲鐵笛橫吹去音留黃鶴樓示瑞國居士師作四相云金剛正眼頂門亞奪命神符肘後懸但得脫身揮寶劍泥牛吼破杳花天無語師見僧來謂旁僧曰有個漢出頭僧曰失卻一隻眼師曰是那一隻僧豎拳師便喝僧拂袖便行師曰切莫詐明頭僧問如何是青州布衫師舉袖示之僧拈果子曰喚作布衫得麼師曰錯認定盤星師見木佛乃曰者尊得力旁有居士曰他佛亦不為師曰為個什麼士無語一居士問玉筯牙筯是同是別師曰放下著士放下師曰是同是別士罔措問僧參甚話頭曰何必多師曰下語看僧豎指師曰何必多師問僧路逢達道人不將語默對畢竟將什麼對僧連下兩語不恰師曰也怪你不得僧問我欲參禪無有入路師召僧僧應諾師曰從者輝崖問前後際斷處得一語省力多少師便打晉侯伯居士曰弟子苦於世網不得常常沾教師曰忙裏求閒白善士問大千俱壞未審者個在什麼處師曰請茶士復問師曰好與三十棒僧灑掃次見師即跪曰弟子獻心師曰把將來僧指渣滓師曰者齷齪東西有甚用處師問衆曰三世諸佛在火焰上說法汝等諸人立地聽且道說底是甚麼法師問僧如何是青州布衫重七斤曰東村王老家出好細布師曰還我青州衫子來曰鎮州出大蘿蔔頭師曰未在師見窗櫺上蝸牛異形脫去謂衆曰物尚如斯人胡不爾一僧曰有變化時師曰汝變看曰某甲是才出家底師與揭卻袍帽僧罔措師問僧不用耳將甚麼聞僧畫相師曰堪作何用僧問虎以肉為食因何不食其子師曰虎曰貓以肉為食因甚又食其子師曰貓僧問如何是泥豬癩狗跛鱉盲龜師叱之曰恁麼則露柱燈籠笑點頭師曰者裏容他不得答巫山楊楚書問火本無我寄於諸緣若無緣時火性藏於何處師曰虛空無曠地大海有餘湲問八面火然無門解脫禍到頭來更作麼生下落師曰不因一事不長一智僧問如何是默然良久消息師曰鼠冀只兩粒穢卻一鍋羹師問僧什麼處去來曰太平山師曰太平是何景象僧無語師曰汝未到太平惺世尼致書問禪師對來人曰須一回親到始得一日掩關來請參頭師示偈曰關鎖由來隔聖凡聖凡路絶不須關但能不識主中主滿目青黃一任看世有省呈二偈曠劫頻頻也不非纖毫無礙恰相宜芒鞋已破三冬雪呵呵正遇出關時陽春白雪與宮商無舌童兒曲曲詳歌罷餘音收不盡西天東土解愁腸知玄禪人受戒次師曰出家人須以己事為重禪人領參後見僧問古德羚羊挂角機緣問師師曰古人言句須自己參透我若為汝說破汝日後罵我去一日歸三教菴過溪喫交自喜曰今日腳跟點地也舉似師師曰不必不必玄禮拜曰和尚若為某甲說破焉有今日僧問曹洞宗旨如何師曰早晚即向道法眼宗旨如何師曰兩眼對兩眼溈仰宗旨如何師畫相雲門宗旨如何師曰高峰頂上臨濟宗旨如何師曰疑殺天下人一僧入室作禮曰還卻和尚乾矢橛師曰喚甚麼作乾矢橛僧作舞師打出師坐次僧復入禮拜師低首僧便跪師直打出遺文講主自雙桂來人事了師曰春秋多少曰六十六師曰與破山相見有何機緣曰二十年前曾問截斷葛藤時如何山曰趙州道底曰是何意旨曰看取下頭注腳師曰會麼主曰而今猶未會在師舉杯曰會麼主低首師呵呵大笑蘊含馮文學十年前曾請竹篦子話頭參一日師問十年前參的聻曰忘卻了也師曰還我話頭來僧問如何是念佛主人公師曰驢檢溼處尿曰畢竟是誰師曰地平好喫交師一日永興洞乘涼僧問此什麼境界師曰不可認作水晶宮曰喚作什麼師曰石山顛釣巧流水梵音奇僧問如何是佛師招手僧近前作禮師打曰今日不得空安碾次一僧曰好個意思師曰是甚麼曰望和尚指點師作惟碾勢平沙居士訪師前殿茶次士曰此殿可作法堂一僧曰要安接引如來士曰和尚即今便是師曰切莫著相士曰非和尚誰敢安座師曰也要大家出隻手士拱手曰領教師便休師問水月禪人什麼處來曰巫夔師曰到此何為曰親覲和尚師曰曾見誰來曰徹融無住諸師師曰有何言句曰教參話頭師曰如何是話頭曰今日親見和尚師曰更道一句曰現在當然師曰機不離位墮在毒海禪人罔措師辭慶忠老人行次實善居士問和尚向甚麼處去師曰岸南永興曰那邊事作麼生師劈面一掌士亦作掌勢師曰我打你也打士拱手師便行僧指衲衣問曰先有衲衣先有和尚師瞬目曰狐猻暗伎倆曰先有衲衣師曰莫眼花僧無語一僧作禮曰今日得遇和尚師曰將什麼遇僧喝師曰不可草草僧珍重作禮而退師謂旁僧曰者漢失卻一隻眼示寧仙居士話頭誰字作麼參眼裏輪珠耳裏看得見彌陀須勦絶從前鼻孔任齁鼾送大樹禪者行腳職事年來頗有功故名大樹繼吾宗前途不被口頭惑一任逢人撞木鐘寄慈祥禪友福城山下句猶存一語相投拂袖行魚化不須頻點額傾湫倒嶽出滄溟示楊仁寰居士持齊念佛又參禪一手何分掌與拳八字眉毛開兩道任君舉目看前川示純若禪者覓心心是妄念佛佛成魔心忘佛俱遣石臼演摩訶示渝州李善士行盡天涯事事休歸來底事問須酬當頭句子如何道月映千江水一鉤示白潛子此日重逢一句無甜瓜卻易苦葫蘆但能識得主中主任駕輕舠泛五湖示以衆族孫多年不作枌榆夢忽得渠來敘故鄉話到石船載寶穀個中情緒說偏長示以元族孫登山涉水叩吾歸底事明明說向回個個鼻頭氣兩孔人人額上一雙眉示四儀山中行野語百般聲呵呵笑優游一個僧山中住黃猿搖緑樹片時間殘紅堆滿路山中坐誰管蒲團破穿不穿由他瞌睡大山中臥夢想也無個主人公那知枕子墮懷蜀撫吳天谷諱保泰居士兼值公誕五雲積岫映窗紗宦海龍文妙轉賒舌底春風懷子野堂前草色憶丹霞法門鐘鼎還相冀內院金湯又可誇不借南溟甘澤遠願君迥出聖凡家過白兔亭峭壁峰巒峙起隈從空瀑布吼如雷亭飛玉兔蟾宮外殿倚金容瑞像開斷字殘碑籠舊靄蒼巖古樹長新苔徘徊漸覺有餘興況借春花把賦裁山居間詠其一折腳鐺中爛煮芹飽餐終日樂欣欣擬看瀑布從空雨卻笑莓苔似倚雲嶺上緑蔭全野景窗前碧水自成文居山且有間生計何必同塵戀世紛其二癡憨學得且潛身縛屋陶陶別野村破竹通泉泛冷月燒鐺覓火煉維坤羊腸徑截輪回路鷹觜鋤開解脫門有日長空風色遠垂綸還擬釣鯨鯤其三枕石眠雲一物無溪山風月自蕭疏猿啼青嶂低巖谷鶴舞丹霄過嶺嵎金字書空傳電影紅輪匝地太陽孤菴內不聞菴外事溢目全彰萬象圖其四自從笑破指頭花教外人傳別有家糞握灰燒乾天橛溝填壑塞爛冬瓜支鐺掬水依危石補衲尋針拾斷麻非是吾儕強設計隨緣且說任周遮慶忠老和尚像讚若是吾師真驀頭拄杖輪冤憾深如海不容紙上存咦捉月擒風心未已又來山水笑煙雲燾上座寫師真請讚者個阿師恰肖誰一世眼高眉毛滿地聖凡不容佛祖難覷直饒圖畫將來何益何益噫者廝老布衲識渠半邊鼻晴川閣樓高近可摩新月影落澄江湛碧天卻笑昔人操晚興屐聲踏踏自何年大別山霄壤雄開峰疊遠突兀仍留大別山帝女樓臺看不盡又添屏障隔雲關黃鶴樓黃鶴已隨仙影去白雲猶帶舊時顏我來賦感澄江冷楖栗還挑閣上山江城晚眺暮色垂空別樣天臨茲江上信悠然瀟湘浩杳湖光淡漢水停淵海印涵奇彩雲邊瞻素月異香池畔撫青蓮墓臺山路行將盡蒼堞重重眼倦看頌古舉世尊一日升座大衆集定文殊白椎云諦觀法王法法王法如是世尊便下座河馬負圖靈龜載書羲皇一眼看破全無舉臨濟宗旨有四料揀四喝四賓主四照用三玄三要三句等事師於臨濟凡見僧入門便喝處云多虛不如少實白拈漢臨濟宗四方八面不通風高著眼撞木鐘無頭無尾活如龍爛葛藤鼠子藥無端捏怪徒捫摸相逢若問意如何木馬雙頭三隻腳舉興化在三聖處為首座常云我在南方行腳一遭拄杖頭不曾撥著一個會佛法底人聖曰具什麼眼便恁麼道化便喝聖曰須是你始得化又到大覺為院主覺云我聞你道向南方行腳一遭拄杖頭不曾撥著一個會佛法底人你憑個什麼道理與麼道化便喝覺便打化又喝覺又打次日相逢覺云我昨日疑你這兩喝化又喝覺又打化再喝覺亦打化云我於三聖師兄處學得個賓主句總被師兄折倒了也願與某甲個安樂法門覺曰者漢來者裏納敗闕脫下衲衣痛與一頓化於言下薦得臨濟先師在黃檗處喫棒道理師拈云直饒脫下衲衣猶未見骨一喝承當四海遊歸來屋裏逞風流忽然見得祖翁業手足冤深似敵讎舉南院上堂諸方只具啐啄同時眼不具啐啄同時用僧問如何是啐啄同時用曰作家不啐啄啐啄同時失僧曰此猶未是某甲問處曰汝問處作麼生僧曰失院乃打僧不肯師拈云氣壓諸方眼空四海固是特見仔細簡點將來且喜沒交涉啐啄同時眼啐啄同時用問答與交馳一場乾打鬨南院老休賣弄捕得鼠來失卻甕舉首山念拈竹篦示衆喚作竹篦則觸不喚作竹篦則背不觸不背喚作什麼葉縣省在會下乃近前掣得折作兩截拋向階下卻云是什麼首山曰瞎縣作禮不觸不背當陽舉似擬議思量髑髏粉碎舉石霜慈明或時方丈安一盆水劄一口劍劍下面著一緉草鞋膝上橫按拄杖入門則指擬議便打劍劄草鞋水一盆無端施設為誰陳太平元是將軍定不許將軍見太平舉楊岐會因僧問如何是佛曰三腳驢子弄蹄行三腳驢子阿誰解跨潘閬騎歸踢踢踏踏舉昭覺勤上堂第一句薦得祖師乞命第二句薦得人天膽落第三句薦得虎口橫身不是循途守轍亦非革轍移途透則六臂三頭未會則人間天上且三句外一句作麼生道生涯低在絲綸上明月扁舟泛五湖透脫羅籠迥異常明明三句絶商量生涯莫執絲綸上赤腳波斯入大唐舉大慧居古雲門菴學者雲集久之入閩結茅於長樂泮嶼室中舉竹篦問學者喚作竹篦則觸不喚作竹篦則背不得有語不得無語從之得法者十三人空中木人拱手樹上烏龜作揖徑山竹篦才拈各自抽身回避咦舉徑山杲上堂今朝又是五月五大鬼拍掌小鬼舞驀然撞著桃符神兩手椎胸叫冤苦艾人云休叫苦遂拈拄杖卓一卓云止有一處堪回互回互不回互回而更相涉擲下云不爾依位住參應時及節多口多舌鬧鬧哄哄明明漏泄卓拄杖云快活舉懶菴一日因大慧問內不放出外不放入正恁麼時如何菴擬開口慧拈竹篦劈脊連打三下菴於此大悟厲聲曰和尚已多了也慧又打一下菴禮拜慧笑曰今日方知吾不欺汝也遂印以偈曰頂門豎亞摩醯眼肘後斜懸奪命符瞎卻眼卸卻符趙州東壁挂葫蘆於是聲名喧動叢林臂脊痛打厲聲叫多得骨得髓作浪興波更付一曲囉哩囉顛來倒去娑婆訶舉鐵牛遠一日身披紅布褲頂笠揮鋤地中朝陽見曰者漢好似一頭軍曰看箭陽作躲箭勢鐵牛近前攜手至菴曰我徑山後裔在此待人數十年矣汝今既來當為我求人中興祖道留住三月付偈曰就身能打劫劈筶善奪窩三玄從此出三要不為多探竿影草分主賓獅子迷蹤奈我何師拈云今日親見徑山老人射鹿轉為射人射石元來射虎若不打劫就機那能超宗超祖師勝資強蘇嚕蘇嚕舉朝陽池之洛伽逢一僧偉儀殊貌迥出衆表陽在前行失腳跌地念阿彌陀佛僧云此是敲門瓦子汝執著作麼遂問拋卻瓦子後如何僧云葉落歸根來時無口陽有省後過秦嶺遇鐵牛方得印可喫交跌地彌陀拋棄拋棄前圖省得巴鼻承當架箭鐵牛機白晝晴空轟霹靂舉聚雲真住湖東上堂至座前連喝三喝云一喝賓主權實一喝玄要照用一喝宗旨大法還會麼升座拈香祝聖次拈云此一瓣香轟天碎地倒嶽傾湫灼破頂門眼睛熏開眉毛骨髓爇向爐中供養臨濟二十四代住西蜀敘州府朱提山朝陽洞月明大和尚用酬法乳維那白椎師乃云劈面迎風掌當胸輥肚拳具眼衲僧向者裏用得猶是三五一輪在在光輝火樹銀花時時燦爛若也半明半暗未夢見在呵呵不是法門無面目只怕蜈蚣太多足咦全機殺活大用現前驅耕奪食痛處加鞭諸方底事卻疑嫌提挈五宗如電捲舉慶忠老人上堂云還知大唐國裏無禪師麼良久云不道無師只是無禪一僧出云諸方去去來來底莫是貨郎行腳耶師曰還見貨郎麼僧歸衆師作搖鞀鼓勢云𨍏轢轢轢輥輥不是胭脂不是粉以拄杖橫肩云上一山放下云下一嶺橫按拄杖云十字街前好合本有麼有麼僧出師喝僧云某甲話也未問因甚就喝師曰交易頭上有火進云請再道師曰人情送隻馬買賣不饒針日無生活計任是斗量金鼕鼕無禪無道亦無師鞀鼓鼕鼕貨物奇不是胭脂不是粉當行能得幾人知舉慶忠老人住清泉上堂舉南泉云王老師自小養一頭水牯牛擬向溪東牧不免犯他國王水草擬向溪西牧不免犯他國王水草不如隨分納些些總不見得忠曰看者南泉老漢說話大似掩耳偷鈴其實難逃治化即如隨分納些些豈不是國王水草清泉者裏卻不然青牛對白牛江水向中流若問其閒意起眼看孤舟恁麼舉似且道與王老師相去多少師拈云南泉恁麼且置清泉與麼道也是量長比短播弄是非還識二老人用處麼隨分納些些不無犯水草何如露地牯饑渴都忘了舉慶忠因一僧入室乃曰向左邊著僧往左曰右邊著僧往右曰向中間著僧往中曰你不會我意出去師徵云者僧果然左右中間都遍歷更云出去切須參假雞聲韻難瞞我未可糊塗放過關舉趙州到一菴主處問有麼有麼菴主豎起拳頭州曰水淺不是泊船處便行又到一菴主處問有麼有麼主亦豎起拳頭州曰能縱能奪能殺能活便作禮師評云者老凍齈兩處著敗誇甚好手會麼另具眼孔始得一釣雙垂意氣深煙霞空落月波心水光一色南峰外懊恨漁舟別處橫舉趙州問僧曾到此間否曰曾到州曰喫茶去又問一僧曾到此間否曰不曾到州曰喫茶去院主問不曾到喫茶去且從為什麼曾到也教喫茶去州召院主主應諾州曰喫茶去師拈云一盞三人飽客來無別款但教喫茶去院主為茶來也教與茶去舉趙州因僧問萬法歸一一歸何處州云我在青州作領布衫重七斤師拈云七穿八漏無領袖襤槮破碎沒中邊惱恨無端老趙州得人之馬便還牛布衫留下勞相重貴賤難將作價酬舉雲門因僧問如何是佛門曰乾屎橛如何是佛乾屎橛平常見解終難測毗盧頂上出頭來三腳蝦蟆吞皓月舉僧問雲門如何是塵塵三昧門曰鉢裏飯桶裏水鉢裏飯兮桶裏水塵塵三昧充寰宇雲門口快舌頭饒總要師僧當下委舉僧問洞山如何是佛山曰麻三斤師別云何不道街頭無字碑無端道出三斤麻千聖叢中顯作家沒眼禪和休擬議子歸啼處有林花舉玄沙備小參次聞燕子聲乃云深讀實相善說法要便下座尋有僧請益云某甲不會沙曰去無人信汝師評云大小玄沙聞燕子聲便恁麼道若聞獅子吼時又說個什麼語燕呢喃音韻奇深談實相欲誰知戀花蝴蝶雙雙舞反笑烏衣不識時舉雙林善慧大士梁武帝請講經士升座以尺撫案一下便下座武帝愕然志公乃問陛下會麼帝云不會志云大士講經竟大士臨臺撫尺時君王不薦卻懷疑經文字字全然在惱恨旁邊作者窺舉傅大士云空手把鋤頭步行騎水牛人從橋下過橋流水不流水漲船高水落石出要行便行要住便住舉傅大士云有物先天地無形本寂寥能為萬象主不逐四時凋有無不立不立有無打個圈子葫蘆葫蘆舉聚雲真上堂曰出衆者三十棒不出衆者三十棒有僧出衆問話不契雲曰直下三玄已露何曾三要無施落花流水空去殿前古柏當機出衆打時不出打承當須是個中人三玄三要重拈示天曉無雲宇宙昏拈評舉唐莊宗幸河北回魏府行宮詔興化問曰朕取中原獲得一寶未曾有人酬價化曰請陛下寶看帝以兩手舒襆頭角化曰君王之寶誰敢酬價拈云雖然彼此作家未免遞相鈍置舉五祖演云老僧遊方十餘年參數十人知識將謂了當及到浮山圓鑒會下更開口不得末後又到白雲因咬破一個鐵餕餡直是百味具足且道餡子一句作麼生道花發雞冠媚早秋何人能染紫絲頭有時風動頻相倚似向階前鬥不休靈隱嶽曰五祖恁麼說話猶缺悟在評云既道百味具足因甚靈隱說猶缺悟在檢點將來悟也悟了只是餕氣未除舉大慧至天寧一日聞圓悟升堂舉僧問雲門如何是諸佛出身處門云東山水上行若是天寧即不然有問如何是諸佛出身處只向他道薰風自南來殿閣生微涼大慧於言下忽然前後際斷拈大慧恁麼也是瞌睡遇著枕子舉懶菴需上堂二十五日已前群陰消伏泥龍閉戶二十五日已後一陽來復鐵樹開花正當二十五日塵中醉客騎驢騎馬前街後街遞相慶賀物外閒人衲帔蒙頭圍爐打坐風蕭蕭雨蕭蕭冷湫湫誰管你張先生李道士胡達磨拈大唐國裏有此翁自當派遠流長兒孫相繼舉鼓山永上堂舉睦州示衆云諸人未得入處須得個入處既得個入處不得忘卻老僧鼓山曰恁麼說話面皮厚多少木菴則不然諸人未得個入處須得個人處既得個入處直須揚下入處始得評二老漢恁麼說話猶有一人呵呵大笑且道笑個什麼既得個入處不得忘卻老僧既得個入處直須揚下入處始得二俱不了畢竟如何化城原非寶所舉茶陵郁山主不曾行腳因廬山化士至論及宗門中事教令看僧問法燈百尺竿頭如何進步法燈曰噁凡三年一日乘驢度橋一踏橋板而墮忽然大悟遂有頌曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照見山河萬朵因此更不遊方徵云猶帶瓦礫塵土氣在舉宋太宗因僧朝見奏云陛下還記得麼帝問甚處相見曰靈山一別直至如今帝曰以何為驗僧無語雪竇代云貧道得得而來評雪竇恁麼道不若無語最親切舉玄沙示衆曰世尊道吾有正法眼藏付囑摩訶大迦葉猶如畫月曹溪豎拂猶如指月時鼓山出衆云月聻沙曰這個阿師就我覓月山不肯卻歸衆云道我就他覓月評靈山畫月曹溪指月玄沙說月鼓山覓月爭似喬松親手拈出舉高峰妙結制上堂大限九旬小限七日粗中有細細中有密密密無間纖毫不立正恁麼時銀山鐵壁進則無門退之則失如墮萬丈深坑四面懸崖荊棘切須猛烈英雄直要翻身跳出若還一念遲疑佛亦救你不得此是最上玄門普請大家著力山僧雖則不管閒非越例與諸人通個消息評既要與諸人通個消息不宜將常住物善自拋撒舉舍利弗問須菩提夢中說六波羅密與覺時是同是別須菩提云此義幽深吾不能說此會中有彌勒大士汝往彼問評舍利弗問夢須菩提答夢各與二十拄杖何以故若不打醒夢語還多行由兩序執事詣方丈致禮請敘入道行由師笑曰山僧非他國人係本蜀鄰水馮氏子母郭氏父祖三代樂善持齊萬曆己未年十一月初六日生兒時每自嘆曰做和尚去父兄輩俱以和尚呼之山僧即欣喜應諾方士過門謂父兄曰此人命相不凡非池中物父母苦教以書嗣相望山僧雖遵父命竊自惟曰幾時遂我出家之志遇論經欣樂睹聞父兄誡曰何不肖伯父雲衢先生之志為當路文秀反樂釋氏之言乎山僧不對勉強從事詩書年將十七先嚴去世服闋未滿每自喜云出家可期也先母難之山僧固辭於本境慧空菴披剃未久遇業師復初乃母族舅氏自兩都回言南北經席禪風山僧投拜會下法名玄憶同住邑中延福寺寺中常開經論山僧苦心聽習經旨大意一一明了唯以自己大事未得脫穎時時在念後於五龍菴講席中遇一禪客雅尚機鋒以青州公案雲門屎橛等語每每相問山僧以己事未明更起一種疑情又於經中諸法從本來常自寂滅相於皆如法師處叩問一味講理期終上華陽山參南宗大師睹普賢瑞境偶於南堂丈中見吹萬師翁像自讚復看案頭一貫別傳五冊從頭細看覺有所得即約同志靈旨數人參見下山餐風宿雨懇懇勤勤買舟東下至平山聞師翁遷化有舍利流輝之異往造聚雲值師翁舍利入塔次睹法録時慶忠本師廬於塔旁參見遂請開示本師書氣志針三目和尚亦書偈令參時崇禎庚辰秋日也復轉鄰陽省親十方堂主人雙松相約冬初結社酆陵地藏禪寺社火場中惟以本參話頭在念苦辛萬狀慮己事未能打徹時時逼拶刻刻提撕明年檀越冉開明邑人士疏請本師開堂到日序執事山僧願入侍寮同衆參究於辛巳十月結制一日挂牌入室本師召入室山僧才入本師曰我不曾教汝山僧珍重便出覺得漆桶子七花八裂自此傾心座下巨細任委不以為勞逆順經嘗終無異志凡有問答靡不當機隨錫東明吟翁白牛世道風鶴避南濱石峰寺得遊藏海六載上青山結制三教雲集開期叨居上板一日木師喚山僧曰相依幾載山僧對曰十載本師曰不必勘驗乃蒙付囑偈曰衣鉢巾瓶不憚勞一身挺特見清操歲寒未改平生節白日青天萬億喬乙未歲學者雲集開爐柏巖禪寺丙申受請住永興退院省老人於太平總戎陳公聞之請住寶勝禪寺未幾踰梁高明王中軍捨宅為寺建此無遮大會延接方來啓山僧者一場把戲今年恰恰四十三歲也以上參師請友略紀二三諸公英靈挺特豈似山僧耶書記存之三楚弟子德勝超範超德信女筤氏超航性信女氏法名挂德亨性輝空現同捐資流通高峰喬松億和尚語録惟願當來世中一問千悟得大總持恆植般若勝因悉獲金剛種智
